# Nginx main.conf — общая часть для base/vision режимов
user www-data;
worker_processes auto;
worker_rlimit_nofile 65535;
error_log /var/log/nginx/error.log warn;
pid /run/nginx.pid;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Корректная обработка WebSocket upgrade через CDN.
    # Если клиент прислал Upgrade — передаём "upgrade".
    # Если нет (CDN закрывает соединение) — передаём "close",
    # чтобы не вешать зависшие соединения с Connection: upgrade.
    map $http_upgrade $connection_upgrade {
        default   upgrade;
        ""        close;
    }
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    # Таймауты для стабильного WebSocket / XHTTP
    keepalive_timeout 65s;
    keepalive_requests 10000;
    client_body_timeout 30s;
    client_header_timeout 30s;
    send_timeout 30s;
    reset_timedout_connection on;

    server_tokens off;

    # gzip только для текстовых ответов от фейкового сайта.
    # НЕ применяется к proxy_pass трафику (WS/XHTTP) — там gzip
    # добавляет только задержку на сжатие уже зашифрованных данных.
    gzip on;
    gzip_vary on;
    gzip_proxied off;
    gzip_comp_level 4;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss;

    include /etc/nginx/conf.d/*.conf;
}
